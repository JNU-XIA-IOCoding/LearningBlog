services:
  db:
    image: postgres:16-alpine
    container_name: phoenix_blog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoenix_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - phoenix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phoenix_blog"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
    container_name: phoenix_blog_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      JWT_SECRET: phoenix-blog-secret
      DATABASE_URL: postgres://postgres:postgres@db:5432/phoenix_blog
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 7s
      retries: 8

  frontend:
    build:
      context: ./frontend
    container_name: phoenix_blog_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE: http://localhost:3001/api
      VITE_PROXY_API_TARGET: http://backend:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  phoenix_pgdata:
  backend_uploads:
  frontend_node_modules:
